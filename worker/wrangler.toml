[dev]
port = 8787
local_protocol = "http"

[vars]
SUPABASE_URL = "https://crnwhlnaiozvqlwavycm.supabase.co"      # v1 live (untouched)
SUPABASE_URL_V2 = "https://bwsqmhtacmdmzscvjcqa.supabase.co"   # v2 A/B (new project)
SHOPIFY_STORE_DOMAIN = "load-controls.myshopify.com"          # Storefront API host (reliable)
